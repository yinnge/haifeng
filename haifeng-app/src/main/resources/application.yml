spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: haifeng-app

server:
  port: ${APP_PORT:8080}

deepseek:
  base-url: https://api.deepseek.com
  model: deepseek-v4-flash
  api-keys: ${DEEPSEEK_API_KEYS:}
  max-tokens: 4096
  temperature: 1.0
  key-cooldown-seconds: 300
  timeout-seconds: 60

submail:
  appid: ${SUBMAIL_APPID:10001}
  appkey: ${SUBMAIL_APPKEY:replace-with-real-key}
  sign: 【海峰规划】
